[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "boost-data-collector"
dynamic = ["version"]
requires-python = ">=3.11"
description = "Boost Data Collector Django project"

[tool.setuptools.packages.find]
where = ["."]
include = ["*"]
exclude = ["*.tests", "*.tests.*", "tests", "tests.*"]

[tool.setuptools_scm]
fallback_version = "0.1.0"
version_file = "core/_version.py"
version_file_template = """# file generated by setuptools-scm; do not edit
version = \"{version}\"
"""
