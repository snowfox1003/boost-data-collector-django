[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "boost-data-collector"
dynamic = ["version"]
# CI/Docker use 3.13; see README Prerequisites.
requires-python = ">=3.13,<3.14"
description = "Boost Data Collector Django project"

[tool.setuptools.packages.find]
where = ["."]
include = ["*"]
exclude = ["*.tests", "*.tests.*", "tests", "tests.*", "benchmarks", "benchmarks.*"]

[tool.setuptools_scm]
fallback_version = "0.2.0"
# write_to (not version_file): vcs_versioning anchors write_to under the project root
# before its tracked-file check; version_file can crash when the file is still in Git.
write_to = "core/_version.py"
write_to_template = """# file generated by setuptools-scm; do not edit
version = \"{version}\"
"""
tag.strict = false
